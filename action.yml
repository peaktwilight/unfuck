name: "unfuck score"
description: "Run unfuck on your codebase and post a score report as a PR comment"
author: "peaktwilight"

branding:
  icon: "check-circle"
  color: "orange"

inputs:
  path:
    description: "Path to scan"
    required: false
    default: "."
  threshold:
    description: "Minimum passing score (0-100). The action fails if the score is below this."
    required: false
    default: "50"

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "18"

    - name: Run unfuck
      id: unfuck
      shell: bash
      run: |
        RESULT=$(npx unfcked --json "${{ inputs.path }}" 2>/dev/null || true)

        SCORE=$(echo "$RESULT" | jq -r '.score // 0')
        VERDICT=$(echo "$RESULT" | jq -r '.verdict // "UNKNOWN"')
        TOTAL=$(echo "$RESULT" | jq '.issues | length')
        CRITICAL=$(echo "$RESULT" | jq '[.issues[] | select(.severity == "critical")] | length')
        HIGH=$(echo "$RESULT" | jq '[.issues[] | select(.severity == "high")] | length')
        MEDIUM=$(echo "$RESULT" | jq '[.issues[] | select(.severity == "medium")] | length')
        LOW=$(echo "$RESULT" | jq '[.issues[] | select(.severity == "low")] | length')

        TOP_ISSUES=$(echo "$RESULT" | jq -r '
          [.issues[] | select(.severity == "critical" or .severity == "high")]
          | sort_by(if .severity == "critical" then 0 else 1 end)
          | .[0:5]
          | .[]
          | "| \(.severity | ascii_upcase) | \(.message) | \(.file // "-") |"
        ')

        if [ "$SCORE" -ge 90 ]; then
          COLOR="brightgreen"
        elif [ "$SCORE" -ge 70 ]; then
          COLOR="green"
        elif [ "$SCORE" -ge 50 ]; then
          COLOR="yellow"
        elif [ "$SCORE" -ge 30 ]; then
          COLOR="orange"
        else
          COLOR="red"
        fi

        BADGE="![unfuck score](https://img.shields.io/badge/unfuck_score-${SCORE}%2F100-${COLOR})"

        {
          echo "score=$SCORE"
          echo "verdict=$VERDICT"
          echo "total=$TOTAL"
          echo "critical=$CRITICAL"
          echo "high=$HIGH"
          echo "medium=$MEDIUM"
          echo "low=$LOW"
          echo "badge=$BADGE"
        } >> "$GITHUB_OUTPUT"

        {
          echo "top_issues<<ISSUES_EOF"
          echo "$TOP_ISSUES"
          echo "ISSUES_EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Find existing comment
      uses: peter-evans/find-comment@v3
      id: find-comment
      with:
        issue-number: ${{ github.event.pull_request.number }}
        comment-author: github-actions[bot]
        body-includes: "<!-- unfuck-score -->"

    - name: Post or update comment
      uses: peter-evans/create-or-update-comment@v4
      with:
        comment-id: ${{ steps.find-comment.outputs.comment-id }}
        issue-number: ${{ github.event.pull_request.number }}
        edit-mode: replace
        body: |
          <!-- unfuck-score -->
          ## unfuck score report

          ${{ steps.unfuck.outputs.badge }}

          **Score: ${{ steps.unfuck.outputs.score }}/100** -- ${{ steps.unfuck.outputs.verdict }}

          ### Issues by severity

          | Severity | Count |
          |----------|-------|
          | :red_circle: Critical | ${{ steps.unfuck.outputs.critical }} |
          | :orange_circle: High | ${{ steps.unfuck.outputs.high }} |
          | :yellow_circle: Medium | ${{ steps.unfuck.outputs.medium }} |
          | :blue_circle: Low | ${{ steps.unfuck.outputs.low }} |
          | **Total** | **${{ steps.unfuck.outputs.total }}** |

          ### Top critical/high issues

          | Severity | Issue | File |
          |----------|-------|------|
          ${{ steps.unfuck.outputs.top_issues }}

          ---
          *Generated by [unfcked](https://github.com/peaktwilight/unfcked)*

    - name: Check threshold
      shell: bash
      run: |
        SCORE=${{ steps.unfuck.outputs.score }}
        THRESHOLD=${{ inputs.threshold }}
        if [ "$SCORE" -lt "$THRESHOLD" ]; then
          echo "::error::unfuck score $SCORE is below threshold $THRESHOLD"
          exit 1
        fi
        echo "unfuck score $SCORE meets threshold $THRESHOLD"
